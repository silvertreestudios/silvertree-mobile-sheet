name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Type-check & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps is required because @testing-library/react-native
        # transitively requires react-test-renderer@^19.2.4, while the project
        # uses react@19.1.0 (Expo 54 ships with React 19.1).
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:ci

      - name: Run snapshot tests
        run: npm run test:snapshot
        continue-on-error: true
